<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050">
    <title>Carrito | Perfumería J y A</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            padding: 40px;
        }

        h1 {
            text-align: center;
        }

        ul {
            list-style: none;
            max-width: 600px;
            margin: auto;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        button {
            background: #d4af37;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .remove {
            background: #c0392b;
            color: #fff;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mobile-wrapper">

        <h1>🛒 Tu carrito</h1>
        <ul id="cart-list"></ul>

        <div id="total-container"
            style="max-width: 600px; margin: 20px auto; text-align: right; font-size: 1.2em; font-weight: bold; padding: 10px; background: #fff; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.15);">
            Total: <span id="cart-total">0</span> COP
        </div>

        <div class="actions">
            <button onclick="checkout()">Pagar / Finalizar compra</button>
            <button onclick="window.location.href='index.html'" style="background: #555; margin-left: 10px;">Seguir
                comprando</button>
        </div>

        <script>
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const list = document.getElementById("cart-list");
            const totalEl = document.getElementById("cart-total");

            function renderCart() {
                list.innerHTML = "";
                let total = 0;

                if (cart.length === 0) {
                    list.innerHTML = "<p style='text-align:center;'>Tu carrito está vacío.</p>";
                    totalEl.textContent = "0";
                    return;
                }

                cart.forEach((item, index) => {
                    const price = Number(item.price) || 0;
                    const subtotal = price * item.quantity;
                    total += subtotal;

                    const li = document.createElement("li");
                    li.style.flexDirection = "column";

                    li.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
                <span style="font-weight: bold; font-size: 1.1em;">${item.name}</span>
                <span>$${price.toLocaleString()}</span>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <button onclick="changeQuantity(${index}, -1)">-</button>
                    <input type="number" min="1" value="${item.quantity}" 
                           onchange="setQuantity(${index}, this.value)"
                           style="width: 35px; text-align: center; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
                    <button onclick="changeQuantity(${index}, 1)">+</button>
                </div>
                <div style="font-weight: bold;">
                    Subtotal: $${subtotal.toLocaleString()}
                </div>
                <button class="remove" onclick="removeItem(${index})">x</button>
            </div>
        `;
                    list.appendChild(li);
                });

                totalEl.textContent = total.toLocaleString();
            }

            function setQuantity(index, value) {
                const qty = parseInt(value);
                if (qty > 0) {
                    cart[index].quantity = qty;
                } else {
                    cart[index].quantity = 1;
                }
                save();
            }

            function changeQuantity(index, change) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) cart.splice(index, 1);
                save();
            }

            function removeItem(index) {
                cart.splice(index, 1);
                save();
            }

            function save() {
                localStorage.setItem("cart", JSON.stringify(cart));
                renderCart();
            }

            function checkout() {
                let message = "Hola, quiero comprar los siguientes perfumes:%0A";
                let total = 0;
                cart.forEach(item => {
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    message += `- ${item.name} (x${item.quantity}) - $${subtotal.toLocaleString()}%0A`;
                });
                message += `%0ATotal: $${total.toLocaleString()}`;

                window.open("https://wa.me/573106491997?text=" + message, "_blank");
            }

            renderCart();
        </script>

</body>

</html>
